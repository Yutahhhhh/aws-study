<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1280" viewBox="0 0 1800 1280" role="img" aria-labelledby="title desc">
  <title id="title">terraform-aws prod AWS構成図</title>
  <desc id="desc">terraform-awsのprod環境をもとにしたWebアプリケーション構成図。CloudFront、S3、ALB、ECS Fargate、RDS、VPC、サブネット、ルートテーブル、VPCエンドポイントを示す。</desc>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", Arial, sans-serif; fill: #475569; }
      .label { font: 700 18px "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", Arial, sans-serif; fill: #475569; }
      .note { font: 700 13px "Hiragino Sans", "Yu Gothic", "Noto Sans CJK JP", Arial, sans-serif; fill: #334155; }
      .external { fill: #fff7ed; stroke: #f59e0b; stroke-width: 2; }
      .edge { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .network { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .compute { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; }
      .data { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .ops { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; }
      .security { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; }
      .vpc { fill: #ffffff; stroke: #0f766e; stroke-width: 3; }
      .az { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 8 6; }
      .public { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
      .private { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; }
      .route { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .blue { fill: none; stroke: #1d4ed8; stroke-width: 3; marker-end: url(#arrowBlue); }
      .green { fill: none; stroke: #047857; stroke-width: 3; marker-end: url(#arrowGreen); }
      .gray { fill: none; stroke: #334155; stroke-width: 2.4; marker-end: url(#arrowGray); }
      .dash { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1280"/>

  <text class="title" x="64" y="54">terraform-aws / prod のAWS構成図</text>
  <text class="subtitle" x="64" y="82">Terraformから読み取れるWebアプリ構成。静的配信はS3、APIはCloudFrontからALBを経由してECS Fargateへ流れる。</text>

  <rect class="route" x="1290" y="36" width="428" height="78" rx="10"/>
  <line class="blue" x1="1322" y1="60" x2="1388" y2="60"/>
  <text class="small" x="1404" y="65">利用者リクエスト</text>
  <line class="green" x1="1322" y1="88" x2="1388" y2="88"/>
  <text class="small" x="1404" y="93">デプロイ・イメージ取得</text>

  <!-- 外部入口 -->
  <rect class="external" x="72" y="142" width="160" height="68" rx="10"/>
  <text class="label" x="116" y="174">利用者</text>
  <text class="small" x="111" y="196">ブラウザ</text>

  <rect class="edge" x="300" y="142" width="190" height="68" rx="10"/>
  <text class="label" x="362" y="174">DNS</text>
  <text class="small" x="334" y="196">ドメイン解決</text>

  <rect class="edge" x="560" y="118" width="310" height="118" rx="12"/>
  <text class="label" x="660" y="151">CloudFront</text>
  <text class="small" x="604" y="178">通常パス → S3</text>
  <text class="small" x="604" y="201">/static/* → S3でキャッシュ</text>
  <text class="small" x="604" y="224">/api/* → ALBへ転送</text>

  <rect class="data" x="960" y="116" width="260" height="94" rx="12"/>
  <text class="label" x="1078" y="149" text-anchor="middle">S3</text>
  <text class="small" x="1006" y="176">フロントエンド配置先</text>
  <text class="small" x="1006" y="198">OAC経由のみ読取</text>

  <rect class="ops" x="1278" y="132" width="210" height="78" rx="10"/>
  <text class="label" x="1336" y="164">GitHub Actions</text>
  <text class="small" x="1320" y="188">OIDCでAWS操作</text>

  <rect class="compute" x="1538" y="132" width="190" height="78" rx="10"/>
  <text class="label" x="1615" y="164">ECR</text>
  <text class="small" x="1584" y="188">コンテナ画像</text>

  <rect class="ops" x="1278" y="244" width="450" height="98" rx="10"/>
  <text class="label" x="1454" y="276" text-anchor="middle">セキュリティ・監視</text>
  <text class="small" x="1314" y="303">CloudWatch Logs / アラーム / X-Ray / VPC Flow Logs</text>
  <text class="tiny" x="1314" y="324">WAF WebACLは定義あり。関連付けはこの図では経路に含めない。</text>

  <path class="blue" d="M 232 176 L 300 176"/>
  <path class="blue" d="M 490 176 L 560 176"/>
  <path class="blue" d="M 870 164 L 960 164"/>
  <path class="green" d="M 1488 171 L 1538 171"/>

  <!-- VPC -->
  <rect class="vpc" x="64" y="376" width="1672" height="834" rx="18"/>
  <text class="label" x="100" y="412">VPC 10.2.0.0/16</text>
  <text class="small" x="100" y="438">パブリックサブネットはInternet Gatewayへ出られる。プライベートサブネットは外部から直接入れない。</text>

  <rect class="network" x="1450" y="404" width="230" height="78" rx="10"/>
  <text class="label" x="1514" y="436">Internet Gateway</text>
  <text class="small" x="1498" y="459">公開側の出口・入口</text>

  <rect class="az" x="104" y="510" width="780" height="474" rx="14"/>
  <text class="note" x="132" y="540">ap-northeast-1a 相当</text>

  <rect class="az" x="916" y="510" width="780" height="474" rx="14"/>
  <text class="note" x="944" y="540">ap-northeast-1c 相当</text>

  <rect class="public" x="136" y="566" width="716" height="162" rx="12"/>
  <text class="label" x="164" y="598">パブリックサブネットA</text>
  <text class="small" x="164" y="622">10.2.1.0/24</text>
  <text class="tiny" x="164" y="646">ルート: 0.0.0.0/0 → Internet Gateway</text>

  <rect class="public" x="948" y="566" width="716" height="162" rx="12"/>
  <text class="label" x="976" y="598">パブリックサブネットC</text>
  <text class="small" x="976" y="622">10.2.2.0/24</text>
  <text class="tiny" x="976" y="646">ルート: 0.0.0.0/0 → Internet Gateway</text>

  <rect class="edge" x="510" y="578" width="780" height="104" rx="12"/>
  <text class="label" x="900" y="611" text-anchor="middle">ALB: アプリケーションロードバランサー</text>
  <text class="small" x="594" y="638">公開サブネットに配置。80/443を受け、HTTPのパスを見て転送する。</text>
  <text class="small" x="594" y="662">/api/* と /health をECSのターゲットグループへ流す。</text>

  <rect class="network" x="198" y="666" width="228" height="48" rx="8"/>
  <text class="small" x="250" y="696">NAT Gateway A</text>

  <rect class="network" x="1010" y="666" width="228" height="48" rx="8"/>
  <text class="small" x="1062" y="696">NAT Gateway C</text>

  <rect class="edge" x="710" y="706" width="380" height="68" rx="10"/>
  <text class="label" x="900" y="734" text-anchor="middle">ターゲットグループ</text>
  <text class="small" x="768" y="758">生きているECSタスクのIP一覧</text>

  <rect class="private" x="136" y="790" width="716" height="160" rx="12"/>
  <text class="label" x="164" y="822">プライベートサブネットA</text>
  <text class="small" x="164" y="846">10.2.11.0/24</text>
  <text class="tiny" x="164" y="870">ルート: 0.0.0.0/0 → NAT Gateway A</text>

  <rect class="private" x="948" y="790" width="716" height="160" rx="12"/>
  <text class="label" x="976" y="822">プライベートサブネットC</text>
  <text class="small" x="976" y="846">10.2.12.0/24</text>
  <text class="tiny" x="976" y="870">ルート: 0.0.0.0/0 → NAT Gateway C</text>

  <rect class="compute" x="388" y="828" width="330" height="84" rx="10"/>
  <text class="label" x="553" y="861" text-anchor="middle">ECS Fargateタスク</text>
  <text class="small" x="444" y="886">コンテナ :3000 / awsvpc</text>

  <rect class="compute" x="1200" y="828" width="330" height="84" rx="10"/>
  <text class="label" x="1365" y="861" text-anchor="middle">ECS Fargateタスク</text>
  <text class="small" x="1252" y="886">希望タスク数 3 / 自動スケール</text>

  <rect class="security" x="136" y="1012" width="386" height="94" rx="12"/>
  <text class="label" x="329" y="1044" text-anchor="middle">セキュリティグループ</text>
  <text class="small" x="174" y="1072">ALB: 80/443をインターネットから許可</text>
  <text class="small" x="174" y="1094">ECS: 3000をALBからだけ許可</text>

  <rect class="data" x="610" y="1012" width="510" height="94" rx="12"/>
  <text class="label" x="865" y="1044" text-anchor="middle">RDS PostgreSQL</text>
  <text class="small" x="656" y="1072">プライベート配置。外部公開なし</text>
  <text class="small" x="656" y="1094">5432はECSのセキュリティグループからだけ許可</text>

  <rect class="ops" x="1206" y="1012" width="434" height="94" rx="12"/>
  <text class="label" x="1423" y="1044" text-anchor="middle">VPCエンドポイント</text>
  <text class="small" x="1248" y="1072">S3 / ECR / ログ / Secrets Manager / X-Ray</text>
  <text class="small" x="1248" y="1094">パブリックIPなしでAWSサービスへ到達する経路</text>

  <rect class="route" x="96" y="1142" width="1608" height="48" rx="10"/>
  <text class="note" x="126" y="1172">ルートテーブルの見方:</text>
  <text class="small" x="292" y="1172">パブリックはIGWへ、プライベートはNATまたはVPCエンドポイントへ。ここで「外から入れるか」「外へ出られるか」が決まる。</text>

  <!-- 経路の矢印 -->
  <path class="blue" d="M 715 236 C 715 370, 710 494, 786 578"/>
  <path class="blue" d="M 900 682 L 900 706"/>
  <path class="blue" d="M 710 748 C 650 766, 602 794, 553 828"/>
  <path class="blue" d="M 1090 748 C 1150 766, 1256 794, 1365 828"/>

  <path class="gray" d="M 553 912 C 626 964, 724 992, 806 1012"/>
  <path class="gray" d="M 1365 912 C 1288 966, 1186 998, 1120 1038"/>
  <path class="green dash" d="M 718 878 C 868 912, 1080 962, 1206 1036"/>
  <path class="green dash" d="M 1530 878 C 1568 930, 1588 976, 1600 1012"/>
</svg>
